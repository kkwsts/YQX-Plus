# @package _global_

defaults:
  - _self_

# Data paths
data:
  vienna4x22_dir: "/homes/hz009/Research/Datasets/vienna4x22"
  # vienna4x22_dir: "/Users/kkwsts/Datasets/vienna4x22"
  use_vienna4x22: true
  asap_dir: "/import/c4dm-datasets-ext/asap-dataset/"
  # asap_dir: "/Users/kkwsts/Datasets/asap-dataset-alignment"
  use_asap: false
  atepp_dir: "/homes/hz009/Research/Datasets/ATEPP-1.1"
  atepp_meta_csv: "/homes/hz009/Research/Datasets/ATEPP-1.1/ATEPP-metadata-1.3.csv"
  use_atepp: false

# Model configuration
model:
  type: "flow"  # Options: "gmm", "flow", "bvae"
  use_midihum_features: false
  
  # Model-specific parameters
  gmm:
    n_components: 48
    random_state: 42
    
  flow:
    hidden_dim: 192
    num_heads: 8
    num_layers: 6
    flow_matcher_type: "standard" # "optimal_transport"
    epochs: 100
    batch_size: 32
    sigma: 0.01
    
  bvae:
    latent_dim: 64
    hidden_dim: 128
    num_heads: 4
    num_layers: 2
    beta: 4.0
    gamma: 10.0
    learning_rate: 0.001
    epochs: 1000
    batch_size: 32

  device: "cpu"  # Options: "cpu", "cuda:0", etc.

# Training configuration
train:
  enabled: false
  batch_size: 32
  num_epochs: 1000
  learning_rate: 0.001

# Testing configuration
test:
  enabled: false

# Rendering configuration
render:
  enabled: false
  input_score: "${data.vienna4x22_dir}/musicxml/Chopin_op10_no3.musicxml"
  output_midi: "${output.output_dir}/Chopin_op10_no3_flow.mid"
  initial_tempo: 120

# Output configuration
output:
  artifacts_dir: "artifacts"
  ckpt_dir: "ckpts"
  output_dir: "outputs"
  save_plots: true
  plot_targets: true
  save_distributions: true
  
  # Experiment tracking
  experiment_name: null  # If null, auto-generate from model config
  include_model_params: true 