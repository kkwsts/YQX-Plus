# @package _global_

defaults:
  - _self_

# Data paths
data:
  vienna4x22_dir: "/Users/huanzhang/01Acdemics/PhD/Research/Datasets/vienna4x22"
  asap_dir: "/Users/huanzhang/01Acdemics/PhD/Research/Datasets/asap-dataset-alignment"
  use_asap: false

# Model configuration
model:
  type: "gmm"  # or "flow"
  n_components: 48
  use_midihum_features: false
  model_path: "${output.ckpt_dir}/yqx_model.pkl"

# Training configuration
train:
  enabled: false
  batch_size: 32
  num_epochs: 100
  learning_rate: 0.001
  validation_split: 0.2

# Rendering configuration
render:
  enabled: false
  input_score: "${data.vienna4x22_dir}/musicxml/Chopin_op10_no3.musicxml"
  output_midi: "${output.output_dir}/Chopin_op10_no3_yqx.mid"
  initial_tempo: 120

# Output configuration
output:
  artifacts_dir: "artifacts"
  ckpt_dir: "ckpts"
  output_dir: "outputs"
  save_plots: true
  plot_targets: true
  save_distributions: true 