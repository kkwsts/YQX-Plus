# @package _global_

defaults:
  - _self_

# Data paths
data:
  vienna4x22_dir: "/Users/kkwsts/Datasets/vienna4x22"
  asap_dir: "/Users/kkwsts/Datasets/asap-dataset-alignment"
  use_asap: false

# Model configuration
model:
  type: "gmm"  # Options: "gmm", "flow", "bvae"
  use_midihum_features: false
  
  # Model-specific parameters
  gmm:
    n_components: 48
    random_state: 42
    
  flow:
    hidden_dim: 128
    flow_matcher_type: "standard"
    sigma: 0.01
    
  bvae:
    latent_dim: 64
    hidden_dims: [256, 128]
    beta: 4.0
    gamma: 1000.0
    learning_rate: 0.001
    epochs: 1000
    batch_size: 32

  # Model path
  model_path: "${output.ckpt_dir}/yqx_${model.type}_model.pkl"
  device: "cpu"  # Options: "cpu", "cuda:0", etc.

# Training configuration
train:
  enabled: false
  batch_size: 32
  num_epochs: 1000
  learning_rate: 0.001
  validation_split: 0.2

# Testing configuration
test:
  enabled: false

# Rendering configuration
render:
  enabled: false
  input_score: "${data.vienna4x22_dir}/musicxml/Chopin_op10_no3.musicxml"
  output_midi: "${output.output_dir}/Chopin_op10_no3_yqx_flow.mid"
  initial_tempo: 120

# Output configuration
output:
  artifacts_dir: "artifacts"
  ckpt_dir: "ckpts"
  output_dir: "outputs"
  save_plots: true
  plot_targets: true
  save_distributions: true
  
  # Experiment tracking
  experiment_name: null  # If null, auto-generate from model config
  include_model_params: true 