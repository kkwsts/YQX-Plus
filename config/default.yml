# @package _global_

defaults:
  - _self_

# Data paths
data:
  vienna4x22_dir: "/data/scratch/acw630/vienna4x22"
  # vienna4x22_dir: "/Users/kkwsts/Datasets/vienna4x22"
  use_vienna4x22: true
  asap_dir: "/data/scratch/acw630/asap-dataset-alignment"
  # asap_dir: "/Users/kkwsts/Datasets/asap-dataset-alignment"
  use_asap: false
  atepp_dir: "/data/scratch/acw630/ATEPP-1.1"
  atepp_meta_csv: "/data/scratch/acw630/ATEPP-1.1/ATEPP-metadata-1.3.csv"
  use_atepp: false

# Model configuration
model:
  type: "xgboost"  # Options: "gmm", "flow", "bvae", "xgboost"
  feature_experiment: "full_context"  # Options: "short_context", "long_context", "full_context"
  use_midihum_features: false
  
  # Model-specific parameters
  gmm:
    n_components: 48
    random_state: 42
    
  flow:
    hidden_dim: 128
    num_heads: 8
    num_layers: 6
    flow_matcher_type: "linear" # "optimal_transport"
    epochs: 1000
    batch_size: 32
    sigma: 0.01
    
  bvae:
    latent_dim: 64
    hidden_dim: 128
    num_heads: 8
    num_layers: 6
    beta: 4.0
    gamma: 10.0
    learning_rate: 0.001
    epochs: 1000
    batch_size: 32

  xgboost:
    learning_rate: 0.05
    max_depth: 7
    n_estimators: 1700
    subsample: 0.9
    colsample_bytree: 0.6
    reg_alpha: 0.2
    reg_lambda: 0.4
    random_state: 42
    n_jobs: 8

  device: "cpu"  # Options: "cpu", "cuda:0", etc.

# Training configuration
train:
  enabled: false
  batch_size: 32
  num_epochs: 1000
  learning_rate: 0.001

# Testing configuration
test:
  enabled: false

# Rendering configuration
render:
  enabled: false
  input_score: "${data.vienna4x22_dir}/musicxml/Chopin_op10_no3.musicxml"
  output_midi: "${output.output_dir}/Chopin_op10_no3_xgboost.mid"
  initial_tempo: 120

# Output configuration
output:
  artifacts_dir: "artifacts"
  ckpt_dir: "ckpts"
  output_dir: "outputs"
  save_plots: true
  plot_targets: true
  save_distributions: true
  
  # Experiment tracking
  experiment_name: null  # If null, auto-generate from model config
  include_model_params: true 